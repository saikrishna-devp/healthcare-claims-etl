aws:
  region: us-east-1
  s3_bucket: healthcare-claims-data-lake
  raw_prefix: raw/claims/
  processed_prefix: processed/claims/
  curated_prefix: curated/claims/

snowflake:
  account: your-account-id
  database: HEALTHCARE_DWH
  schema: CLAIMS
  warehouse: CLAIMS_WH
  role: DATA_ENGINEER

airflow:
  dag_id: healthcare_claims_pipeline
  schedule: "0 2 * * *"
  retries: 3
  retry_delay_minutes: 5
  sla_hours: 4

pipeline:
  lookback_days: 1
  min_expected_rows: 1000
  max_expected_rows: 10000000
